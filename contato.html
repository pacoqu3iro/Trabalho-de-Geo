<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato Bio</title>
    <!-- Utilizando Tailwind CSS para um estilo moderno e simples -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos adicionais suaves */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Container do Formulário -->
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        
        <!-- Cabeçalho -->
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-800">Contato Bio</h2>
            <p class="text-sm text-gray-500 mt-2">Preencha os dados abaixo para entrar em contato.</p>
        </div>

        <!-- Formulário -->
        <form id="contatoForm" class="space-y-5">
            
            <!-- Pergunta 1: Data -->
            <div>
                <label for="data" class="block text-sm font-medium text-gray-700 mb-1">Data</label>
                <input type="date" id="data" name="data" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors text-gray-700">
            </div>

            <!-- Pergunta 2: E-mail -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors text-gray-700">
            </div>

            <!-- Pergunta 3: Número (Telefone) -->
            <div>
                <label for="numero" class="block text-sm font-medium text-gray-700 mb-1">Número de Telefone</label>
                <input type="tel" id="numero" name="numero" placeholder="(00) 00000-0000" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors text-gray-700">
            </div>

            <!-- Pergunta 4: Assunto -->
            <div>
                <label for="assunto" class="block text-sm font-medium text-gray-700 mb-1">Assunto</label>
                <textarea id="assunto" name="assunto" rows="4" placeholder="Sobre o que deseja falar?" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors text-gray-700 resize-none"></textarea>
            </div>

            <!-- Botão de Enviar -->
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Enviar Mensagem
            </button>
            
            <!-- Mensagem de Sucesso (Oculta por padrão) -->
            <div id="mensagemSucesso" class="hidden mt-4 p-3 bg-green-50 text-green-700 text-sm text-center rounded-lg border border-green-200">
                Obrigado! Sua mensagem foi enviada com sucesso. Redirecionando...
            </div>

        </form>
    </div>

    <script>
        // Lógica simples para demonstrar o envio sem recarregar a página
        document.getElementById('contatoForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Evita que a página recarregue
            
            // Oculta o botão e mostra a mensagem de sucesso
            const btnSubmit = this.querySelector('button[type="submit"]');
            const divSucesso = document.getElementById('mensagemSucesso');
            
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = 'Enviando...';
            btnSubmit.classList.add('opacity-70', 'cursor-not-allowed');

            // Simula um tempo de envio de 1 segundo
            setTimeout(() => {
                btnSubmit.style.display = 'none';
                divSucesso.classList.remove('hidden');
                this.reset(); // Limpa os campos do formulário

                // NOVA LÓGICA: Aguarda 3 segundos (3000ms) e redireciona para index.html
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);

            }, 1000);
        });
    </script>
</body>
</html>
